<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — Clinic</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #1B1B2F;
  --gold: #F26522;
  --white: #ffffff;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'Courier New', monospace;
}

html, body {
  height: 100%;
  background: #000;
  color: #fff;
  font-family: var(--sans);
  overflow: hidden;
}

/* ── DECK: full screen slide area ── */
#deck {
  position: fixed;
  inset: 0 0 56px 0;
  background: #000;
}

/* ── SLIDE CANVAS: 16:9 centered ── */
#slide-canvas {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#slide-frame {
  position: relative;
  background: #000;
  overflow: hidden;
  /* sized by JS to maintain 16:9 */
}

/* ── VIDEO SLIDE ── */
#video-slide {
  position: absolute;
  inset: 0;
  background: #000;
  display: none;
  flex-direction: column;
}
#video-slide.active { display: flex; }

#video-el {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
  display: block;
}

#drop-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: #0a0a0a;
  color: #666;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.15s;
}
#drop-overlay.dragover, #drop-overlay:hover { background: #111; }
#drop-overlay i { font-size: 56px; color: #333; }
#drop-overlay .browse-label {
  padding: 8px 20px;
  border: 1px solid #333;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  color: #aaa;
  transition: border-color 0.15s, color 0.15s;
}
#drop-overlay .browse-label:hover { border-color: var(--gold); color: var(--gold); }
#file-input { display: none; }

/* Video controls bar (inside video slide, bottom) */
#video-controls {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
#video-slide:hover #video-controls,
#video-controls.visible { opacity: 1; pointer-events: all; }

.vc-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  flex-shrink: 0;
  transition: background 0.1s;
}
.vc-btn:hover { background: rgba(255,255,255,0.22); }
.vc-btn.active { background: rgba(242,101,34,0.3); border-color: var(--gold); color: var(--gold); }

#vc-scrubber {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
  cursor: pointer;
  outline: none;
}
#vc-scrubber::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}
#vc-timecode {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  min-width: 80px;
  text-align: right;
}
#vc-speed {
  font-size: 11px;
  height: 28px;
  border-radius: 6px;
  padding: 0 6px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  color: #fff;
  cursor: pointer;
}

/* ── CONTENT SLIDE ── */
#content-slide {
  position: absolute;
  inset: 0;
  display: none;
  background: #fff;
  color: #111;
}
#content-slide.active { display: block; }

/* Slide layouts rendered by JS */
#slide-inner {
  width: 100%;
  height: 100%;
  position: relative;
}

/* ── TOOLBAR (bottom bar) ── */
#toolbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  background: var(--navy);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  border-top: 2px solid var(--gold);
  z-index: 100;
}

.tb-btn {
  display: flex; align-items: center; justify-content: center;
  height: 36px;
  padding: 0 12px;
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.85);
  cursor: pointer;
  font-size: 13px;
  gap: 6px;
  white-space: nowrap;
  transition: background 0.1s;
  font-family: var(--sans);
}
.tb-btn:hover { background: rgba(255,255,255,0.14); }
.tb-btn.primary {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--navy);
  font-weight: 600;
}
.tb-btn.primary:hover { opacity: 0.88; }
.tb-btn.danger { border-color: rgba(255,80,80,0.3); color: #ff8080; }
.tb-btn.danger:hover { background: rgba(255,80,80,0.1); }

#tb-slide-indicator {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  font-family: var(--mono);
  min-width: 60px;
  text-align: center;
}

#tb-slide-title {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tb-sep {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.kbd {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.45);
  margin: 0 1px;
}

/* ── EDITOR PANEL (slide-out) ── */
#editor-panel {
  position: fixed;
  top: 0; right: -400px;
  width: 380px;
  bottom: 56px;
  background: #1a1a2e;
  border-left: 1px solid rgba(255,255,255,0.1);
  transition: right 0.25s ease;
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#editor-panel.open { right: 0; }

#ep-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: var(--navy);
}
#ep-header h2 { font-size: 14px; font-weight: 600; color: #fff; }

#ep-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.ep-field label { font-size: 11px; color: rgba(255,255,255,0.45); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.ep-field input, .ep-field textarea, .ep-field select {
  width: 100%;
  font-size: 13px;
  padding: 7px 10px;
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-family: var(--sans);
  outline: none;
}
.ep-field input:focus, .ep-field textarea:focus { border-color: var(--gold); }
.ep-group { display: flex; flex-direction: column; gap: 10px; }
.ep-field textarea { height: 80px; resize: vertical; line-height: 1.55; }
.ep-field select option { background: #222; }

#ep-slide-list { display: flex; flex-direction: column; gap: 4px; }
.ep-thumb {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 7px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
}
.ep-thumb:hover { background: rgba(255,255,255,0.06); }
.ep-thumb.active { background: rgba(242,101,34,0.12); border-color: rgba(242,101,34,0.3); color: #fff; }
.ep-thumb-num { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.3); min-width: 18px; }
.ep-thumb.active .ep-thumb-num { color: var(--gold); }
.ep-type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-title { background: #666; }
.dot-video { background: var(--gold); }
.dot-reveal { background: #4caf82; }
.dot-rulechange { background: #e05a2b; }
.dot-emphasis { background: #5b9bd5; }
.dot-mechanics { background: #8e6bbf; }
.dot-discussion { background: #e8b84b; }
.dot-casebook { background: #4caf82; }
.dot-stat { background: #e05a2b; }
.dot-embed { background: #aaa; }

#ep-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; flex-wrap: wrap; }

/* ── EXPORT TOAST ── */
#toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#editor-saving{position:fixed;top:16px;right:16px;background:rgba(242,101,34,0.9);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
#editor-saving.show{opacity:1}
</style>
</head>
<body>
<!-- MAIN DECK -->
<div id="deck">
  <div id="slide-canvas">
    <div id="slide-frame">

      <!-- VIDEO SLIDE -->
      <div id="video-slide" class="active">
        <video id="video-el" preload="auto"></video>
        <div id="drop-overlay">
          <i class="ti ti-movie"></i>
          <div>Drop a video file here to load</div>
          <label class="browse-label" for="file-input">
            <i class="ti ti-folder-open"></i> Browse for file
          </label>
          <input type="file" id="file-input" accept="video/*">
          <div style="font-size:12px; color:#444;">MP4, MOV, MKV — stays local, never uploaded</div>
        </div>
        <div id="video-controls">
          <button class="vc-btn" id="vc-back5"><i class="ti ti-player-skip-back"></i></button>
          <button class="vc-btn" id="vc-prevframe"><i class="ti ti-chevron-left"></i></button>
          <button class="vc-btn" id="vc-play"><i class="ti ti-player-play"></i></button>
          <button class="vc-btn" id="vc-nextframe"><i class="ti ti-chevron-right"></i></button>
          <button class="vc-btn" id="vc-fwd5"><i class="ti ti-player-skip-forward"></i></button>
          <input type="range" id="vc-scrubber" min="0" max="10000" value="0" step="1">
          <span id="vc-timecode">00:00:00.000</span>
          <button class="vc-btn" id="vc-loop"><i class="ti ti-repeat"></i></button>
          <select id="vc-speed">
            <option value="0.1">0.1×</option>
            <option value="0.25">0.25×</option>
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
        </div>
      </div>

      <!-- CONTENT SLIDE -->
      <div id="content-slide">
        <div id="slide-inner"></div>
      </div>

    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tb-btn" id="tb-prev"><i class="ti ti-chevron-left"></i> Prev</button>
  <button class="tb-btn primary" id="tb-next">Next <i class="ti ti-chevron-right"></i></button>
  <div class="tb-sep"></div>
  <span id="tb-slide-indicator">1 / 1</span>
  <span id="tb-slide-title"></span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tb-video-toggle"><i class="ti ti-video"></i> Video</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tb-edit"><i class="ti ti-layout-sidebar-right"></i> Edit Slides</button>
  <div style="margin-left:auto; display:flex; gap:4px; align-items:center;">
    <span class="kbd">Space</span><span style="font-size:10px;color:rgba(255,255,255,0.3);margin:0 4px;">play</span>
    <span class="kbd">←</span><span class="kbd">→</span><span style="font-size:10px;color:rgba(255,255,255,0.3);margin:0 4px;">frame</span>
    <span class="kbd">[</span><span class="kbd">]</span><span style="font-size:10px;color:rgba(255,255,255,0.3);margin:0 4px;">slides</span>
  </div>
</div>

<!-- EDITOR PANEL -->
<div id="editor-panel">
  <div id="ep-header">
    <h2>Edit Slides</h2>
    <button class="tb-btn" id="ep-close" style="padding:0 10px; height:30px; font-size:12px;">
      <i class="ti ti-x"></i> Close
    </button>
  </div>
  <div id="ep-scroll">
    <div style="font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Slides</div>
    <div id="ep-slide-list"></div>
    <div style="height:1px;background:rgba(255,255,255,0.08);margin:12px 0;"></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Edit selected slide</div>

    <div class="ep-field">
      <label>Slide type</label>
      <select id="ep-type">
        <option value="title">Title slide</option>
        <option value="video">Scenario (video)</option>
        <option value="reveal">Answer reveal</option>
        <option value="rulechange">Rule change</option>
        <option value="emphasis">Points of emphasis</option>
        <option value="mechanics">Mechanics / positioning</option>
        <option value="discussion">Discussion question</option>
        <option value="casebook">Casebook play</option>
        <option value="stat">Stat / callout</option>
        <option value="embed">Embed / Slido</option>
      </select>
    </div>

    <!-- TITLE fields -->
    <div class="ep-group" id="epg-title">
      <div class="ep-field"><label>Main title</label><input type="text" id="ep-title" placeholder="e.g. You Make the Call"></div>
      <div class="ep-field"><label>Eyebrow label <span style="opacity:.5;font-weight:400;">(top small text)</span></label><input type="text" id="ep-eyebrow" placeholder="e.g. IHSA · Boys Volleyball"></div>
      <div class="ep-field"><label>Subtitle <span style="opacity:.5;font-weight:400;">(bottom)</span></label><textarea id="ep-subtitle" placeholder="e.g. NFHS Rules Scenarios" style="height:52px;"></textarea></div>
      <div class="ep-field" id="ep-logo-field">
        <label>Logo</label>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <label style="cursor:pointer;padding:5px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;font-size:12px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.05);">
            <i class="ti ti-upload"></i> Upload logo
            <input type="file" id="ep-logo-input" accept="image/*" style="display:none;">
          </label>
          <span id="ep-logo-status" style="font-size:11px;color:rgba(255,255,255,0.4);">no logo</span>
          <button id="ep-logo-clear" style="display:none;font-size:11px;padding:4px 8px;border:1px solid rgba(255,80,80,0.3);border-radius:5px;background:none;color:#ff8080;cursor:pointer;">remove</button>
        </div>
        <div id="ep-logo-preview" style="margin-top:8px;"></div>
      </div>
    </div>

    <!-- VIDEO fields -->
    <div class="ep-group" id="epg-video">
      <div class="ep-field"><label>Scenario label <span style="opacity:.5;font-weight:400;">(orange panel)</span></label><input type="text" id="ep-vid-title" placeholder="e.g. Scenario 1"></div>
      <div class="ep-field"><label>Left panel text <span style="opacity:.5;font-weight:400;">(big stacked)</span></label><textarea id="ep-vid-panel" placeholder="e.g. You&#10;Make&#10;the&#10;Call" style="height:80px;"></textarea></div>
      <div class="ep-field"><label>Situation eyebrow <span style="opacity:.5;font-weight:400;">(label above body)</span></label><input type="text" id="ep-vid-eyebrow" placeholder="e.g. Situation"></div>
      <div class="ep-field"><label>Situation body</label><textarea id="ep-vid-body" placeholder="Describe the play..." style="height:80px;"></textarea></div>
      <div class="ep-field"><label>Call-to-action badge</label><input type="text" id="ep-vid-cta" placeholder="e.g. What&#39;s your call?"></div>
      <div class="ep-field">
        <label style="text-transform:none;font-size:12px;font-weight:400;display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="ep-vid-video-first" style="width:auto;accent-color:var(--gold);">
          Show video first (unchecked = situation text first)
        </label>
        <label style="text-transform:none;font-size:12px;font-weight:400;display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:6px;">
          <input type="checkbox" id="ep-vid-show-text" style="width:auto;accent-color:var(--gold);" checked>
          Show situation text slide
        </label>
      </div>
      <div class="ep-field">
        <label>Attached video clip <span style="opacity:.5;font-weight:400;">(auto-loads in viewer)</span></label>
        <select id="ep-vid-clip" style="width:100%;">
          <option value="">— none / load manually —</option>
        </select>
        <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;">Upload clips in Admin or use the Clips panel in the toolbar</div>
      </div>
    </div>

    <!-- REVEAL fields -->
    <div class="ep-group" id="epg-reveal">
      <div class="ep-field"><label>Header label <span style="opacity:.5;font-weight:400;">(small top text)</span></label><input type="text" id="ep-rev-eyebrow" placeholder="e.g. The Call · Answer"></div>
      <div class="ep-field"><label>Ruling <span style="opacity:.5;font-weight:400;">(big white text in band)</span></label><input type="text" id="ep-rev-ruling" placeholder="e.g. FAULT — FOUR HITS"></div>
      <div class="ep-field"><label>Rule citation</label><input type="text" id="ep-rev-rule" placeholder="e.g. NFHS Rule 9-1-2"></div>
      <div class="ep-field"><label>Explanation</label><textarea id="ep-rev-body" placeholder="Rule explanation..." style="height:80px;"></textarea></div>
      <div class="ep-field"><label>Officials&#39; note label</label><input type="text" id="ep-rev-notelabel" placeholder="e.g. Officials&#39; Note"></div>
      <div class="ep-field"><label>Officials&#39; note text</label><textarea id="ep-rev-note" placeholder="Mechanic reminder..." style="height:60px;"></textarea></div>
    </div>

    <!-- EMBED fields -->
    <div class="ep-group" id="epg-embed">
      <div class="ep-field"><label>Slide label <span style="opacity:.5;font-weight:400;">(shown in slide list)</span></label><input type="text" id="ep-emb-title" placeholder="e.g. Live Poll — Scenario 1"></div>
      <div class="ep-field"><label>Header text <span style="opacity:.5;font-weight:400;">(top bar)</span></label><input type="text" id="ep-emb-header" placeholder="e.g. Cast Your Vote"></div>
      <div class="ep-field">
        <label>Embed HTML <span style="opacity:.5;font-weight:400;">(paste Slido iframe or any HTML)</span></label>
        <textarea id="ep-emb-html" placeholder="&lt;iframe src=&quot;https://app.sli.do/...&quot; ...&gt;&lt;/iframe&gt;" style="height:120px;font-family:monospace;font-size:11px;"></textarea>
      </div>
    </div>

    <!-- RULE CHANGE fields -->
    <div class="ep-group" id="epg-rulechange">
      <div class="ep-field"><label>Slide label</label><input type="text" id="ep-rc-title" placeholder="e.g. Rule Change — Libero"></div>
      <div class="ep-field"><label>Rule citation</label><input type="text" id="ep-rc-rule" placeholder="e.g. NFHS Rule 7-4-1"></div>
      <div class="ep-field"><label>Section heading</label><input type="text" id="ep-rc-heading" placeholder="e.g. Libero Replacement"></div>
      <div class="ep-field"><label>Previous rule <span style="opacity:.5;font-weight:400;">(left column)</span></label><textarea id="ep-rc-old" placeholder="What the rule said before..." style="height:70px;"></textarea></div>
      <div class="ep-field"><label>New rule <span style="opacity:.5;font-weight:400;">(right column)</span></label><textarea id="ep-rc-new" placeholder="What the rule says now..." style="height:70px;"></textarea></div>
      <div class="ep-field"><label>Note <span style="opacity:.5;font-weight:400;">(optional bottom bar)</span></label><input type="text" id="ep-rc-note" placeholder="e.g. Effective 2025-26 season"></div>
    </div>

    <!-- POINTS OF EMPHASIS fields -->
    <div class="ep-group" id="epg-emphasis">
      <div class="ep-field"><label>Slide label</label><input type="text" id="ep-em-title" placeholder="e.g. 2025-26 Points of Emphasis"></div>
      <div class="ep-field"><label>Header</label><input type="text" id="ep-em-header" placeholder="e.g. Points of Emphasis"></div>
      <div class="ep-field"><label>Season / subtitle</label><input type="text" id="ep-em-season" placeholder="e.g. 2025–26 IHSA Boys Volleyball"></div>
      <div class="ep-field"><label>Item 1</label><input type="text" id="ep-em-1" placeholder=""></div>
      <div class="ep-field"><label>Item 1 detail</label><input type="text" id="ep-em-1d" placeholder="optional detail line"></div>
      <div class="ep-field"><label>Item 2</label><input type="text" id="ep-em-2" placeholder=""></div>
      <div class="ep-field"><label>Item 2 detail</label><input type="text" id="ep-em-2d" placeholder=""></div>
      <div class="ep-field"><label>Item 3</label><input type="text" id="ep-em-3" placeholder=""></div>
      <div class="ep-field"><label>Item 3 detail</label><input type="text" id="ep-em-3d" placeholder=""></div>
      <div class="ep-field"><label>Item 4</label><input type="text" id="ep-em-4" placeholder=""></div>
      <div class="ep-field"><label>Item 4 detail</label><input type="text" id="ep-em-4d" placeholder=""></div>

      <div class="ep-field"><label>Header</label><input type="text" id="ep-mech-header" placeholder="e.g. Mechanics — Service Coverage"></div>
      <div class="ep-field"><label>Subtitle</label><input type="text" id="ep-mech-sub" placeholder="e.g. First Referee Responsibilities"></div>
      <div class="ep-field"><label>Key points <span style="opacity:.5;font-weight:400;">(one per line)</span></label><textarea id="ep-mech-points" placeholder="Watch for foot fault at service line&#10;Cover net contact near antenna&#10;Signal antennae violations immediately" style="height:90px;"></textarea></div>
      <div class="ep-field"><label>Bottom note</label><input type="text" id="ep-mech-note" placeholder="e.g. Communicate with R2 on close calls"></div>
      <div class="ep-field">
        <label>Diagram image <span style="opacity:.5;font-weight:400;">(replaces placeholder)</span></label>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <label style="cursor:pointer;padding:5px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;font-size:12px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.05);">
            <i class="ti ti-upload"></i> Upload diagram
            <input type="file" id="ep-mech-img-input" accept="image/*" style="display:none;">
          </label>
          <span id="ep-mech-img-status" style="font-size:11px;color:rgba(255,255,255,0.4);">no image</span>
          <button id="ep-mech-img-clear" style="display:none;font-size:11px;padding:4px 8px;border:1px solid rgba(255,80,80,0.3);border-radius:5px;background:none;color:#ff8080;cursor:pointer;">remove</button>
        </div>
        <div id="ep-mech-img-preview" style="margin-top:8px;"></div>
      </div>
    </div>

    <!-- DISCUSSION fields -->
    <div class="ep-group" id="epg-discussion">
      <div class="ep-field"><label>Slide label</label><input type="text" id="ep-disc-title" placeholder="e.g. Group Discussion"></div>
      <div class="ep-field"><label>Question</label><textarea id="ep-disc-q" placeholder="e.g. How do you handle a coach who repeatedly questions line calls?" style="height:80px;"></textarea></div>
      <div class="ep-field"><label>Context / setup <span style="opacity:.5;font-weight:400;">(optional smaller text below)</span></label><textarea id="ep-disc-ctx" placeholder="Optional background or scenario context..." style="height:60px;"></textarea></div>
      <div class="ep-field"><label>Time prompt <span style="opacity:.5;font-weight:400;">(e.g. "5 minutes")</span></label><input type="text" id="ep-disc-time" placeholder="e.g. 5 minutes"></div>
    </div>

    <!-- CASEBOOK fields -->
    <div class="ep-group" id="epg-casebook">
      <div class="ep-field"><label>Slide label</label><input type="text" id="ep-cb-title" placeholder="e.g. Casebook 9.1.1 Situation A"></div>
      <div class="ep-field"><label>Citation</label><input type="text" id="ep-cb-cite" placeholder="e.g. NFHS Casebook 9.1.1 Sit. A"></div>
      <div class="ep-field"><label>Situation <span style="opacity:.5;font-weight:400;">(left column)</span></label><textarea id="ep-cb-sit" placeholder="Describe the situation..." style="height:90px;"></textarea></div>
      <div class="ep-field"><label>Ruling <span style="opacity:.5;font-weight:400;">(right column)</span></label><textarea id="ep-cb-ruling" placeholder="The ruling is..." style="height:90px;"></textarea></div>
      <div class="ep-field"><label>Key principle</label><input type="text" id="ep-cb-principle" placeholder="e.g. Attack hit must be entirely above the net"></div>
    </div>

    <!-- STAT fields -->
    <div class="ep-group" id="epg-stat">
      <div class="ep-field"><label>Slide label</label><input type="text" id="ep-st-title" placeholder="e.g. Did You Know?"></div>
      <div class="ep-field"><label>Big number / stat</label><input type="text" id="ep-st-stat" placeholder="e.g. 73%"></div>
      <div class="ep-field"><label>Stat label</label><input type="text" id="ep-st-label" placeholder="e.g. of officials missed this call in 2024"></div>
      <div class="ep-field"><label>Supporting text</label><textarea id="ep-st-body" placeholder="Additional context or explanation..." style="height:70px;"></textarea></div>
      <div class="ep-field"><label>Source <span style="opacity:.5;font-weight:400;">(optional)</span></label><input type="text" id="ep-st-source" placeholder="e.g. IHSA Officials Survey 2024"></div>
    </div>

  </div>
  <div id="ep-footer">
    <button class="tb-btn primary" id="ep-save"><i class="ti ti-check"></i> Save</button>
    <button class="tb-btn" id="ep-add"><i class="ti ti-plus"></i> Add slide</button>
    <button class="tb-btn danger" id="ep-delete"><i class="ti ti-trash"></i> Delete</button>
  </div>
</div>

<div id="toast"></div>
<div id="editor-saving">Saving...</div>
<script src="/assets/renderer.js"></script>
<script>

/* ── STATE ── */
const defaultSlides = [
  { type:'title',  title:'You Make the Call', body:'IHSA Boys Volleyball\nNFHS Rules Scenarios', rule:'', data:{} },
  { type:'video',  title:'Scenario 1', body:'Describe the situation here.\n\nWhat is your call?', rule:'', data:{} },
  { type:'reveal', title:'Scenario 1 — Answer', body:'YOUR RULING HERE\n\nExplanation goes here.', rule:'NFHS Rule X-X', data:{} },
];
let slides = [];
let currentSlide = 0;
let showingVideo = true;
let looping = false;
let cbPhase = 0;
let mechImageSrc = {};
let titleLogoSrc = null;
const video = document.getElementById('video-el');

/* ── LAYOUT SIZING ── */
function resizeFrame() {
  const deck = document.getElementById('deck');
  const W = deck.offsetWidth, H = deck.offsetHeight;
  const targetRatio = 16/9;
  let w = W, h = W / targetRatio;
  if (h > H) { h = H; w = H * targetRatio; }
  const frame = document.getElementById('slide-frame');
  frame.style.width = w + 'px';
  frame.style.height = h + 'px';
}
window.addEventListener('resize', resizeFrame);
resizeFrame();

/* ── SLIDE RENDERER ── */

// Design system constants (resolved at render time from sc)
// Layout: every slide has a 10px left orange stripe, 64px navy top bar, consistent padding
// Typography: eyebrow 11px/700/tracking, heading 36-80px/800, body 18-22px/400
// Colors: NAVY bg or white bg, GOLD accents, white text on dark, #1a1a1a on light

function topBar(sc, labelText, rightEl) {
  const bar = el('div',`position:absolute;top:0;left:0;right:0;height:${64*sc}px;background:${NAVY};display:flex;align-items:center;padding:0 ${32*sc}px;gap:${14*sc}px;`);
  const stripe = el('div',`width:${10*sc}px;height:${36*sc}px;background:${GOLD};border-radius:${2*sc}px;flex-shrink:0;`);
  const lbl = el('span',`font-size:${11*sc}px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:${3*sc}px;text-transform:uppercase;`);
  lbl.textContent = labelText;
  bar.append(stripe, lbl);
  if (rightEl) { rightEl.style.marginLeft = 'auto'; bar.appendChild(rightEl); }
  return bar;
}

function pill(sc, text, dark) {
  const p = el('span',`font-size:${11*sc}px;font-weight:700;padding:${4*sc}px ${14*sc}px;border-radius:${20*sc}px;white-space:nowrap;`);
  p.textContent = text;
  if (dark) { p.style.background = GOLD; p.style.color = '#fff'; }
  else { p.style.border = `1px solid rgba(242,101,34,0.5)`; p.style.color = GOLD; }
  return p;
}

function noteFooter(sc, label, text) {
  const bar = el('div',`position:absolute;left:0;right:0;bottom:0;height:${72*sc}px;background:#fff;border-top:${3*sc}px solid ${GOLD};display:flex;align-items:center;padding:0 ${32*sc}px;gap:${14*sc}px;`);
  const dot = el('div',`width:${8*sc}px;height:${8*sc}px;border-radius:50%;background:${GOLD};flex-shrink:0;`);
  const right = el('div',`flex:1;min-width:0;`);
  const lbl = el('div',`font-size:${10*sc}px;font-weight:700;color:${GOLD};letter-spacing:${2*sc}px;text-transform:uppercase;margin-bottom:${2*sc}px;`);
  lbl.textContent = label || "Officials' Note";
  const txt = el('div',`font-size:${13*sc}px;color:#666;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`);
  txt.textContent = text || 'Add a key takeaway for officials here.';
  right.append(lbl, txt);
  bar.append(dot, right);
  return bar;
}

function renderSlideContent(slide, container) {
  container.innerHTML = '';
  const w = container.offsetWidth || parseInt(document.getElementById('slide-frame').style.width) || 960;
  const h = container.offsetHeight || parseInt(document.getElementById('slide-frame').style.height) || 540;
  const sc = w / 960;
  const d = slide.data || {};

  const s = document.createElement('div');
  s.style.cssText = `width:${w}px;height:${h}px;position:relative;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;`;

  // ── TITLE ─────────────────────────────────────────────────────────────
  if (slide.type === 'title') {
    s.style.background = NAVY;
    // Left stripe
    s.appendChild(el('div',`position:absolute;left:0;top:0;bottom:0;width:${28*sc}px;background:${GOLD};`));
    // Geometric circles top-right
    s.appendChild(el('div',`position:absolute;right:${-90*sc}px;top:${-90*sc}px;width:${400*sc}px;height:${400*sc}px;border-radius:50%;border:${6*sc}px solid rgba(242,101,34,0.2);`));
    s.appendChild(el('div',`position:absolute;right:${-20*sc}px;top:${-20*sc}px;width:${240*sc}px;height:${240*sc}px;border-radius:50%;border:${5*sc}px solid rgba(242,101,34,0.14);`));
    s.appendChild(el('div',`position:absolute;right:${50*sc}px;top:${50*sc}px;width:${120*sc}px;height:${120*sc}px;border-radius:50%;border:${3*sc}px solid rgba(242,101,34,0.08);`));
    const L = 60;
    if (titleLogoSrc) {
      // Logo-dominant layout: logo takes right ~55% of slide, text left column
      const logoWrap = el('div',`position:absolute;right:${40*sc}px;top:${50*sc}px;bottom:${50*sc}px;width:${360*sc}px;display:flex;align-items:center;justify-content:center;`);
      const img = document.createElement('img');
      img.src = titleLogoSrc;
      img.style.cssText = `max-width:${340*sc}px;max-height:${h - 120*sc}px;width:auto;height:auto;object-fit:contain;`;
      logoWrap.appendChild(img);
      s.appendChild(logoWrap);
      // Subtle vertical divider
      s.appendChild(el('div',`position:absolute;right:${408*sc}px;top:${60*sc}px;bottom:${60*sc}px;width:${1*sc}px;background:rgba(255,255,255,0.08);`));
      // Left text column
      const ew = el('div',`position:absolute;left:${L*sc}px;top:${40*sc}px;right:${428*sc}px;font-size:${11*sc}px;font-weight:700;color:${GOLD};letter-spacing:${3*sc}px;text-transform:uppercase;`);
      ew.textContent = d.eyebrow || 'IHSA · Boys Volleyball';
      const tt = el('div',`position:absolute;left:${L*sc}px;top:${h*0.20}px;right:${428*sc}px;font-size:${54*sc}px;font-weight:800;color:#fff;line-height:0.95;letter-spacing:${-0.5*sc}px;`);
      tt.style.wordBreak='break-word';
      tt.textContent = d.title || slide.title;
      const divL = el('div',`position:absolute;left:${L*sc}px;bottom:${108*sc}px;width:${40*sc}px;height:${4*sc}px;background:${GOLD};border-radius:2px;`);
      const sub = el('div',`position:absolute;left:${L*sc}px;bottom:${48*sc}px;right:${428*sc}px;font-size:${16*sc}px;color:rgba(255,255,255,0.4);line-height:1.5;`);
      sub.style.whiteSpace='pre-line';
      sub.textContent = d.subtitle || slide.body || '';
      s.append(ew, tt, divL, sub);
    } else {
      // No logo — full width title layout
      const ew = el('div',`position:absolute;left:${L*sc}px;top:${40*sc}px;font-size:${12*sc}px;font-weight:700;color:${GOLD};letter-spacing:${3*sc}px;text-transform:uppercase;`);
      ew.textContent = d.eyebrow || 'IHSA · Boys Volleyball';
      const tt = el('div',`position:absolute;left:${L*sc}px;top:${h*0.20}px;right:${140*sc}px;font-size:${78*sc}px;font-weight:800;color:#fff;line-height:0.92;letter-spacing:${-1*sc}px;`);
      tt.style.wordBreak='break-word';
      tt.textContent = d.title || slide.title;
      const div = el('div',`position:absolute;left:${L*sc}px;bottom:${108*sc}px;width:${48*sc}px;height:${4*sc}px;background:${GOLD};border-radius:2px;`);
      const sub = el('div',`position:absolute;left:${L*sc}px;bottom:${48*sc}px;right:${140*sc}px;font-size:${19*sc}px;color:rgba(255,255,255,0.45);line-height:1.5;`);
      sub.style.whiteSpace='pre-line';
      sub.textContent = d.subtitle || slide.body || '';
      s.append(ew, tt, div, sub);
    }

  // ── VIDEO / SCENARIO ──────────────────────────────────────────────────
  } else if (slide.type === 'video') {
    s.style.background = '#EFEFED';
    // Left orange panel
    const panel = el('div',`position:absolute;left:0;top:0;bottom:0;width:${360*sc}px;background:${GOLD};display:flex;flex-direction:column;justify-content:flex-end;padding:${40*sc}px ${36*sc}px;`);
    // Dark notch top of panel
    panel.appendChild(el('div',`position:absolute;top:0;left:0;right:0;height:${5*sc}px;background:rgba(0,0,0,0.2);`));
    const scenLabel = el('div',`font-size:${11*sc}px;font-weight:700;color:rgba(255,255,255,0.65);letter-spacing:${3*sc}px;text-transform:uppercase;margin-bottom:${10*sc}px;`);
    scenLabel.textContent = d.vidTitle || slide.title;
    const bigTxt = el('div',`font-size:${56*sc}px;font-weight:900;color:#fff;line-height:0.88;letter-spacing:${-1*sc}px;text-transform:uppercase;margin-bottom:${24*sc}px;`);
    bigTxt.style.whiteSpace='pre-line';
    bigTxt.textContent = d.panelText || 'You\nMake\nthe\nCall';
    // Bottom pill on panel
    const ctaBadge = el('div',`display:inline-block;background:${NAVY};color:#fff;font-size:${14*sc}px;font-weight:700;padding:${9*sc}px ${22*sc}px;border-radius:${4*sc}px;letter-spacing:${0.3*sc}px;`);
    ctaBadge.textContent = d.vidCta || "What's your call?";
    panel.append(scenLabel, bigTxt, ctaBadge);
    // Right content area
    const eyeLbl = el('div',`position:absolute;left:${392*sc}px;top:${36*sc}px;font-size:${11*sc}px;font-weight:700;color:${GOLD};letter-spacing:${3*sc}px;text-transform:uppercase;`);
    eyeLbl.textContent = d.vidEyebrow || 'Situation';
    const ruleLine = el('div',`position:absolute;left:${392*sc}px;top:${62*sc}px;right:${32*sc}px;height:${1*sc}px;background:rgba(0,0,0,0.1);`);
    const bodyTxt = el('div',`position:absolute;left:${392*sc}px;top:${82*sc}px;right:${32*sc}px;bottom:${32*sc}px;font-size:${20*sc}px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap;overflow:hidden;`);
    bodyTxt.textContent = d.vidBody || slide.body || '';
    s.append(panel, eyeLbl, ruleLine, bodyTxt);

  // ── ANSWER REVEAL ─────────────────────────────────────────────────────
  } else if (slide.type === 'reveal') {
    s.style.background = '#EFEFED';
    // Full-width dark top half
    const darkHalf = el('div',`position:absolute;top:0;left:0;right:0;height:${h*0.48}px;background:${NAVY};`);
    // Left orange stripe on dark half
    darkHalf.appendChild(el('div',`position:absolute;top:0;left:0;width:${10*sc}px;bottom:0;background:${GOLD};`));
    const eyebrow = el('div',`position:absolute;top:${22*sc}px;left:${32*sc}px;font-size:${11*sc}px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:${3*sc}px;text-transform:uppercase;`);
    eyebrow.textContent = d.revEyebrow || 'The Call · Answer';
    const ruling = el('div',`position:absolute;top:${46*sc}px;left:${32*sc}px;right:${32*sc}px;font-size:${54*sc}px;font-weight:800;color:#fff;line-height:0.95;letter-spacing:${-0.5*sc}px;overflow:hidden;`);
    ruling.style.maxHeight = `${130*sc}px`;
    ruling.textContent = d.revRuling || slide.title;
    // Rule pill straddling the boundary
    const rulPill = el('div',`position:absolute;top:${h*0.48 - 16*sc}px;left:${32*sc}px;background:${GOLD};color:#fff;font-size:${11*sc}px;font-weight:700;padding:${4*sc}px ${16*sc}px;border-radius:${20*sc}px;letter-spacing:${0.5*sc}px;`);
    rulPill.textContent = d.revRule || slide.rule || 'NFHS Rule';
    // Explanation text in light area
    const expl = el('div',`position:absolute;left:${32*sc}px;right:${32*sc}px;top:${h*0.48 + 24*sc}px;bottom:${84*sc}px;font-size:${18*sc}px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap;overflow:hidden;`);
    expl.textContent = d.revBody || slide.body || '';
    s.append(darkHalf, eyebrow, ruling, rulPill, expl, noteFooter(sc, d.revNoteLabel, d.revNote));

  // ── EMBED / SLIDO ─────────────────────────────────────────────────────
  } else if (slide.type === 'embed') {
    s.style.background = NAVY;
    const bar = topBar(sc, d.embHeader || slide.title || 'Live Poll', null);
    const area = el('div',`position:absolute;left:0;right:0;top:${64*sc}px;bottom:0;display:flex;align-items:center;justify-content:center;`);
    if (d.embHtml) {
      const wrap = el('div',`width:100%;height:100%;`);
      wrap.innerHTML = d.embHtml;
      wrap.querySelectorAll('iframe').forEach(f=>{ f.style.width='100%'; f.style.height=`${h-64*sc}px`; f.style.border='none'; });
      area.appendChild(wrap);
    } else {
      const ph = el('div',`text-align:center;color:rgba(255,255,255,0.3);font-size:${15*sc}px;line-height:2;`);
      ph.innerHTML = 'Paste Slido or embed HTML in the editor';
      area.appendChild(ph);
    }
    s.append(bar, area);

  // ── RULE CHANGE ───────────────────────────────────────────────────────
  } else if (slide.type === 'rulechange') {
    s.style.background = '#EFEFED';
    const rPill = pill(sc, d.rcRule || 'Rule', true);
    s.appendChild(topBar(sc, 'Rule Change', rPill));
    // Heading
    const hd = el('div',`position:absolute;left:${32*sc}px;top:${82*sc}px;right:${32*sc}px;font-size:${32*sc}px;font-weight:800;color:${NAVY};line-height:1.1;`);
    hd.textContent = d.rcHeading || slide.title;
    // Two columns
    const gap = 12*sc, cw = (w - 64*sc - gap) / 2;
    const mk = (left, hdrTxt, bodyTxt, isNew) => {
      const col = el('div',`position:absolute;left:${left}px;top:${142*sc}px;width:${cw}px;bottom:${32*sc}px;background:#fff;border-radius:${8*sc}px;overflow:hidden;${isNew ? `border-top:${4*sc}px solid ${GOLD};` : 'border-top:4px solid #ccc;'}`);
      const ch = el('div',`padding:${10*sc}px ${16*sc}px ${8*sc}px;font-size:${10*sc}px;font-weight:700;letter-spacing:${1.5*sc}px;text-transform:uppercase;color:${isNew ? GOLD : '#999'};`);
      ch.textContent = hdrTxt;
      const cb = el('div',`padding:${14*sc}px ${16*sc}px;font-size:${17*sc}px;color:${isNew?'#111':'#777'};line-height:1.65;white-space:pre-wrap;${isNew?'font-weight:500;':''}`);
      cb.textContent = bodyTxt;
      col.append(ch, cb);
      return col;
    };
    s.append(hd, mk(32*sc, 'Previous', d.rcOld||'', false), mk(32*sc+cw+gap, 'New Rule', d.rcNew||'', true));
    // Arrow between
    const arw = el('div',`position:absolute;left:${32*sc+cw}px;width:${gap}px;top:${142*sc}px;bottom:${32*sc}px;display:flex;align-items:center;justify-content:center;font-size:${22*sc}px;color:${GOLD};font-weight:900;`);
    arw.textContent='→';
    // Bottom note
    const nb = el('div',`position:absolute;left:0;right:0;bottom:0;height:${0}px;`); // replaced by note if present
    if (d.rcNote) {
      const nb2 = el('div',`position:absolute;left:${32*sc}px;bottom:${8*sc}px;font-size:${12*sc}px;color:#999;font-style:italic;`);
      nb2.textContent = d.rcNote;
      s.appendChild(nb2);
    }
    s.appendChild(arw);

  // ── POINTS OF EMPHASIS ────────────────────────────────────────────────
  } else if (slide.type === 'emphasis') {
    s.style.background = NAVY;
    s.appendChild(el('div',`position:absolute;left:0;top:0;bottom:0;width:${10*sc}px;background:${GOLD};`));
    const seasonL = el('div',`position:absolute;left:${32*sc}px;top:${30*sc}px;font-size:${11*sc}px;font-weight:700;color:${GOLD};letter-spacing:${3*sc}px;text-transform:uppercase;`);
    seasonL.textContent = d.emSeason || 'IHSA Boys Volleyball';
    const hd2 = el('div',`position:absolute;left:${32*sc}px;top:${52*sc}px;right:${60*sc}px;font-size:${40*sc}px;font-weight:800;color:#fff;line-height:1;`);
    hd2.textContent = d.emHeader || 'Points of Emphasis';
    s.appendChild(el('div',`position:absolute;left:${32*sc}px;top:${118*sc}px;right:${32*sc}px;height:${1*sc}px;background:rgba(255,255,255,0.1);`));
    const items=[
      [d.em1||'',d.em1d||''],[d.em2||'',d.em2d||''],[d.em3||'',d.em3d||''],[d.em4||'',d.em4d||'']
    ].filter(([t])=>t.trim());
    const avail = h - 140*sc, itemH = Math.min(avail / Math.max(items.length,1), 98*sc);

/* ── SHOW SLIDE ── */
function showSlide(idx) {
  currentSlide = Math.max(0, Math.min(slides.length - 1, idx));
  const slide = slides[currentSlide];
  const isVideo = showingVideo && slide.type === 'video';

  document.getElementById('video-slide').classList.toggle('active', isVideo || (showingVideo && slide.type !== 'video' && slide.type !== 'reveal'));
  const showContent = !isVideo;
  document.getElementById('content-slide').classList.toggle('active', showContent);
  document.getElementById('video-slide').classList.toggle('active', !showContent);

  if (showContent) {
    const inner = document.getElementById('slide-inner');
    inner.style.width = document.getElementById('slide-frame').style.width;
    inner.style.height = document.getElementById('slide-frame').style.height;
    renderSlideContent(slide, inner);
  }

  document.getElementById('tb-slide-indicator').textContent = `${currentSlide+1} / ${slides.length}`;
  document.getElementById('tb-slide-title').textContent = slide.title;
  renderEditorList();
  populateEditor();
}

/* Switching between video and slide view for current position */
function setView(wantVideo) {
  const slide = slides[currentSlide];
  if (slide.type !== 'video') wantVideo = false;
  showingVideo = wantVideo;
  const videoSlide = document.getElementById('video-slide');
  const contentSlide = document.getElementById('content-slide');
  if (wantVideo) {
    videoSlide.classList.add('active');
    contentSlide.classList.remove('active');
  } else {
    videoSlide.classList.remove('active');
    contentSlide.classList.add('active');
    const inner = document.getElementById('slide-inner');
    inner.style.width = document.getElementById('slide-frame').style.width;
    inner.style.height = document.getElementById('slide-frame').style.height;
    renderSlideContent(slide, inner);
  }
  document.getElementById('tb-slide-title').textContent = slide.title;
}

/* ── NAVIGATION ── */
document.getElementById('tb-prev').addEventListener('click', () => {
  if (showingVideo && slides[currentSlide].type === 'video') {
    setView(false);
  } else if (slides[currentSlide].type === 'casebook' && cbPhase === 1) {
    cbPhase = 0;
    setView(false);
  } else if (currentSlide > 0) {
    currentSlide--;
    cbPhase = 0;
    const s = slides[currentSlide];
    showingVideo = s.type === 'video';
    showSlide(currentSlide);
    if (s.type === 'video') setView(true);
  }
});

document.getElementById('tb-next').addEventListener('click', advanceNext);

function advanceNext() {
  const slide = slides[currentSlide];
  const order = (slide.data && slide.data.vidOrder) || 'video';
  const showText = slide.data ? slide.data.vidShowText !== false : true;
  if (slide.type === 'video') {
    // video-first: video -> situation (if enabled) -> next slide
    if (order === 'video' && showingVideo && showText) { setView(false); return; }
    // situation-first: situation -> video -> next slide
    if (order === 'situation' && !showingVideo && showText) { setView(true); return; }
  }
  if (slide.type === 'casebook' && cbPhase === 0) { cbPhase = 1; setView(false); return; }
  if (currentSlide < slides.length - 1) {
    currentSlide++;
    cbPhase = 0;
    const s = slides[currentSlide];
    const nextOrder = (s.data && s.data.vidOrder) || 'video';
    if (s.type === 'video') {
      showingVideo = nextOrder === 'video';
      setView(showingVideo);
    } else {
      showingVideo = false;
      setView(false);
    }
    showSlide(currentSlide);
  }
}

document.getElementById('tb-video-toggle').addEventListener('click', () => {

});

video.addEventListener('timeupdate', () => {
  const t = video.currentTime, d = video.duration || 1;
  document.getElementById('vc-scrubber').value = Math.round((t/d)*10000);
  const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=Math.floor(t%60), ms=Math.floor((t%1)*1000);
  document.getElementById('vc-timecode').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
});
video.addEventListener('play', () => { document.getElementById('vc-play').innerHTML='<i class="ti ti-player-pause"></i>'; });
video.addEventListener('pause', () => { document.getElementById('vc-play').innerHTML='<i class="ti ti-player-play"></i>'; });
video.addEventListener('ended', () => {
  if (looping) { video.currentTime=0; video.play(); }
  else document.getElementById('vc-play').innerHTML='<i class="ti ti-player-play"></i>';
});

document.getElementById('vc-play').addEventListener('click', () => { video.src && (video.paused ? video.play() : video.pause()); });
document.getElementById('vc-prevframe').addEventListener('click', () => { video.pause(); video.currentTime = Math.max(0, video.currentTime - 1/FPS); });
document.getElementById('vc-nextframe').addEventListener('click', () => { video.pause(); video.currentTime = Math.min(video.duration||0, video.currentTime + 1/FPS); });
document.getElementById('vc-back5').addEventListener('click', () => { video.currentTime = Math.max(0, video.currentTime - 5); });
document.getElementById('vc-fwd5').addEventListener('click', () => { video.currentTime = Math.min(video.duration||0, video.currentTime + 5); });
document.getElementById('vc-loop').addEventListener('click', () => {
  looping = !looping;
  video.loop = looping;
  document.getElementById('vc-loop').classList.toggle('active', looping);
});
document.getElementById('vc-speed').addEventListener('change', e => { video.playbackRate = parseFloat(e.target.value); });
document.getElementById('vc-scrubber').addEventListener('input', e => {
  if (video.duration) video.currentTime = (e.target.value/10000) * video.duration;
});

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if (e.code==='Space') { e.preventDefault(); document.getElementById('vc-play').click(); }
  if (e.code==='ArrowLeft' && !e.shiftKey) { e.preventDefault(); document.getElementById('vc-prevframe').click(); }
  if (e.code==='ArrowRight' && !e.shiftKey) { e.preventDefault(); document.getElementById('vc-nextframe').click(); }
  if (e.code==='ArrowLeft' && e.shiftKey) { e.preventDefault(); document.getElementById('vc-back5').click(); }
  if (e.code==='ArrowRight' && e.shiftKey) { e.preventDefault(); document.getElementById('vc-fwd5').click(); }
  if (e.key==='[') { e.preventDefault(); document.getElementById('tb-prev').click(); }
  if (e.key===']') { e.preventDefault(); advanceNext(); }
  if (e.key==='l'||e.key==='L') document.getElementById('vc-loop').click();
});

function renderEditorList() {
  const list = document.getElementById('ep-slide-list');
  list.innerHTML = slides.map((sl,i) => `
    <div class="ep-thumb${i===currentSlide?' active':''}" data-idx="${i}" draggable="true">
      <span style="cursor:grab;color:rgba(255,255,255,0.2);font-size:14px;margin-right:4px;user-select:none;">&#8942;&#8942;</span>
      <span class="ep-thumb-num">${i+1}</span>
      <span class="ep-type-dot dot-${sl.type}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${sl.title}</span>
    </div>
  `).join('');

  let dragIdx = null;
  list.querySelectorAll('.ep-thumb').forEach(t => {
    t.addEventListener('click', () => {
      currentSlide = parseInt(t.dataset.idx);
      showSlide(currentSlide);
    });
    t.addEventListener('dragstart', e => {
      dragIdx = parseInt(t.dataset.idx);
      t.style.opacity = '0.5';
      e.dataTransfer.effectAllowed = 'move';
    });
    t.addEventListener('dragend', () => { t.style.opacity = ''; dragIdx = null; });
    t.addEventListener('dragover', e => { e.preventDefault(); t.style.background = 'rgba(242,101,34,0.15)'; });
    t.addEventListener('dragleave', () => { t.style.background = ''; });
    t.addEventListener('drop', e => {
      e.preventDefault();
      t.style.background = '';
      const dropIdx = parseInt(t.dataset.idx);
      if (dragIdx === null || dragIdx === dropIdx) return;
      const moved = slides.splice(dragIdx, 1)[0];
      slides.splice(dropIdx, 0, moved);
      currentSlide = dropIdx;
      saveSlides();
      showSlide(currentSlide);
    });
  });
}

  ['title','video','reveal','embed','rulechange','emphasis','mechanics','discussion','casebook','stat'].forEach(t => {

  } else if (s.type === 'emphasis') {
    g('ep-em-title').value = d.emTitle || s.title || '';
    g('ep-em-header').value = d.emHeader || 'Points of Emphasis';
    g('ep-em-season').value = d.emSeason || 'IHSA Boys Volleyball';
    g('ep-em-1').value = d.em1 || ''; g('ep-em-1d').value = d.em1d || '';
    g('ep-em-2').value = d.em2 || ''; g('ep-em-2d').value = d.em2d || '';
    g('ep-em-3').value = d.em3 || ''; g('ep-em-3d').value = d.em3d || '';
    g('ep-em-4').value = d.em4 || ''; g('ep-em-4d').value = d.em4d || '';
  } else if (s.type === 'mechanics') {
    g('ep-mech-title').value = d.mechTitle || s.title || '';
    g('ep-mech-header').value = d.mechHeader || '';
    g('ep-mech-sub').value = d.mechSub || '';
    g('ep-mech-points').value = d.mechPoints || '';

  } else if (s.type === 'discussion') {
    g('ep-disc-title').value = d.discTitle || s.title || '';
    g('ep-disc-q').value = d.discQ || '';
    g('ep-disc-ctx').value = d.discCtx || '';
    g('ep-disc-time').value = d.discTime || '';
  } else if (s.type === 'casebook') {
    g('ep-cb-title').value = d.cbTitle || s.title || '';
    g('ep-cb-cite').value = d.cbCite || '';
    g('ep-cb-sit').value = d.cbSit || '';
    g('ep-cb-ruling').value = d.cbRuling || '';
    g('ep-cb-principle').value = d.cbPrinciple || '';
  } else if (s.type === 'stat') {
    g('ep-st-title').value = d.stTitle || s.title || '';
    g('ep-st-stat').value = d.stStat || '';
    g('ep-st-label').value = d.stLabel || '';
    g('ep-st-body').value = d.stBody || '';
    g('ep-st-source').value = d.stSource || '';
  }
}

g('ep-type').addEventListener('change', () => {
  showGroups(g('ep-type').value);
});

function updateLogoUI() {
  const status = g('ep-logo-status');
  const clearBtn = g('ep-logo-clear');
  const preview = g('ep-logo-preview');
  if (!status) return;
  if (titleLogoSrc) {
    status.textContent = 'logo loaded';
    status.style.color = '#5dba7d';
    clearBtn.style.display = 'inline-block';
    preview.innerHTML = '<img src="' + titleLogoSrc + '" style="max-height:48px;max-width:160px;object-fit:contain;border-radius:4px;background:rgba(255,255,255,0.08);padding:4px;">';
  } else {
    status.textContent = 'no logo';
    status.style.color = 'rgba(255,255,255,0.4)';
    clearBtn.style.display = 'none';
    preview.innerHTML = '';
  }
}

g('ep-logo-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    titleLogoSrc = ev.target.result;
    
    updateLogoUI();
    if (slides[currentSlide].type === 'title') showSlide(currentSlide);
  };
  reader.readAsDataURL(file);
});

g('ep-logo-clear').addEventListener('click', () => {
  titleLogoSrc = null;
  
  g('ep-logo-input').value = '';
  updateLogoUI();
  if (slides[currentSlide].type === 'title') showSlide(currentSlide);
});

// Mechanics image upload

g('ep-mech-img-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    mechImageSrc[currentSlide] = ev.target.result;

g('ep-mech-img-clear').addEventListener('click', () => {

  updateMechImgUI();
  if (slides[currentSlide].type === 'mechanics') showSlide(currentSlide);
});

g('ep-save').addEventListener('click', () => {
  const type = g('ep-type').value;
  let data = {};
  let title = '';

  if (type === 'title') {
    data = {
      title: g('ep-title').value,
      eyebrow: g('ep-eyebrow').value,
      subtitle: g('ep-subtitle').value,
    };
    title = g('ep-title').value;
  } else if (type === 'video') {
    data = {
      vidTitle: g('ep-vid-title').value,
      panelText: g('ep-vid-panel').value,
      vidEyebrow: g('ep-vid-eyebrow').value,
      vidBody: g('ep-vid-body').value,
      vidCta: g('ep-vid-cta').value,
      vidOrder: g('ep-vid-video-first').checked ? 'video' : 'situation',
      vidShowText: g('ep-vid-show-text').checked,
      vidClipUrl: g('ep-vid-clip').value || '',
    };
    title = g('ep-vid-title').value;
  } else if (type === 'reveal') {
    data = {
      revEyebrow: g('ep-rev-eyebrow').value,
      revRuling: g('ep-rev-ruling').value,
      revRule: g('ep-rev-rule').value,
      revBody: g('ep-rev-body').value,
      revNoteLabel: g('ep-rev-notelabel').value,
      revNote: g('ep-rev-note').value,
    };
    title = g('ep-rev-ruling').value;
  } else if (type === 'embed') {
    data = { embTitle: g('ep-emb-title').value, embHeader: g('ep-emb-header').value, embHtml: g('ep-emb-html').value };
    title = g('ep-emb-title').value || 'Embed';
  } else if (type === 'rulechange') {
    data = { rcTitle: g('ep-rc-title').value, rcRule: g('ep-rc-rule').value, rcHeading: g('ep-rc-heading').value, rcOld: g('ep-rc-old').value, rcNew: g('ep-rc-new').value, rcNote: g('ep-rc-note').value };
    title = g('ep-rc-title').value || 'Rule Change';
  } else if (type === 'emphasis') {
    data = { emTitle: g('ep-em-title').value, emHeader: g('ep-em-header').value, emSeason: g('ep-em-season').value, em1: g('ep-em-1').value, em1d: g('ep-em-1d').value, em2: g('ep-em-2').value, em2d: g('ep-em-2d').value, em3: g('ep-em-3').value, em3d: g('ep-em-3d').value, em4: g('ep-em-4').value, em4d: g('ep-em-4d').value };
    title = g('ep-em-title').value || 'Points of Emphasis';
  } else if (type === 'mechanics') {
    data = { mechTitle: g('ep-mech-title').value, mechHeader: g('ep-mech-header').value, mechSub: g('ep-mech-sub').value, mechPoints: g('ep-mech-points').value, mechNote: g('ep-mech-note').value };
    title = g('ep-mech-title').value || 'Mechanics';
  } else if (type === 'discussion') {
    data = { discTitle: g('ep-disc-title').value, discQ: g('ep-disc-q').value, discCtx: g('ep-disc-ctx').value, discTime: g('ep-disc-time').value };
    title = g('ep-disc-title').value || 'Discussion';
  } else if (type === 'casebook') {
    data = { cbTitle: g('ep-cb-title').value, cbCite: g('ep-cb-cite').value, cbSit: g('ep-cb-sit').value, cbRuling: g('ep-cb-ruling').value, cbPrinciple: g('ep-cb-principle').value };
    title = g('ep-cb-title').value || 'Casebook';
  } else if (type === 'stat') {
    data = { stTitle: g('ep-st-title').value, stStat: g('ep-st-stat').value, stLabel: g('ep-st-label').value, stBody: g('ep-st-body').value, stSource: g('ep-st-source').value };
    title = g('ep-st-title').value || 'Stat';
  }

  slides[currentSlide] = { type, title, body: '', rule: '', data };
  saveSlides();
  showSlide(currentSlide);
  toast('Saved');
});

g('ep-add').addEventListener('click', () => {
  const type = g('ep-type').value === 'embed' ? 'embed' : 'video';
  const newSlide = type === 'embed'
    ? { type:'embed', title:'Live Poll', body:'', rule:'', data:{ embTitle:'Live Poll', embHeader:'Cast Your Vote', embHtml:'' } }
    : { type:'video', title:`Scenario ${slides.filter(s=>s.type==='video').length+1}`, body:'', rule:'', data:{} };
  slides.splice(currentSlide+1, 0, newSlide);
  currentSlide++;
  saveSlides();
  showSlide(currentSlide);
});

document.getElementById('ep-delete').addEventListener('click', () => {
  if (slides.length <= 1) return;
  if (!confirm(`Delete "${slides[currentSlide].title}"?`)) return;
  slides.splice(currentSlide, 1);
  if (currentSlide >= slides.length) currentSlide = slides.length - 1;
  saveSlides();
  showSlide(currentSlide);
});

/* ── INIT ── */
const slug = location.pathname.split('/edit/')[1];
let saveTimer = null;

function saveSlides() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const el = document.getElementById('editor-saving') || document.createElement('div');
    el.classList.add('show');
    try {
      const r = await fetch('/api/presentations/' + slug + '/slides', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({slides})
      });
      const d = await r.json();
      if (!d.ok) console.error('Save failed:', d);
    } catch(e) {
      console.error('Save error:', e);
    } finally {
      setTimeout(() => el.classList.remove('show'), 1200);
    }
  }, 800);
}

async function populateClipPicker(selectedUrl) {
  const sel = g('ep-vid-clip');
  if (!sel) return;
  sel.innerHTML = '<option value="">— none / load manually —</option>';
  try {
    const r = await fetch('/api/presentations/' + slug + '/videos');
    const vids = await r.json();
    vids.forEach(v => {
      const url = v.scope === 'shared' ? '/videos/shared/' + v.filename : '/videos/p/' + slug + '/' + v.filename;
      const opt = document.createElement('option');
      opt.value = url;
      opt.textContent = (v.scope === 'shared' ? '⚡ ' : '📁 ') + v.original_name + ' (' + (v.size/1024/1024).toFixed(0) + 'MB)';
      opt.selected = url === selectedUrl;
      sel.appendChild(opt);
    });
  } catch(e) { /* no clips */ }
}

async function loadFromServer() {
  try {
    const [sr, mr] = await Promise.all([
      fetch('/api/presentations/' + slug + '/slides'),
      fetch('/api/presentations/' + slug)
    ]);
    if (!sr.ok) { alert('Presentation not found or access denied'); return; }
    const serverSlides = await sr.json();
    const meta = await mr.json();
    document.title = 'Edit: ' + meta.title + ' — Clinic';
    slides = serverSlides.length ? serverSlides : defaultSlides;
    showSlide(0);
    loadServerClipList();
  } catch(e) {
    console.error('Load error:', e);
    slides = defaultSlides;
    showSlide(0);
  }
}

async function loadServerClipList() {
  try {
    const r = await fetch('/api/presentations/' + slug + '/videos');
    const vids = await r.json();
    const ep = document.getElementById('ep-scroll');
    if (!ep || !vids.length) return;
    const clipDiv = document.createElement('div');
    clipDiv.style.cssText = 'border-top:1px solid rgba(255,255,255,0.08);margin-top:12px;padding-top:12px;';
    clipDiv.innerHTML = '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Video Clips</div>';
    vids.forEach(v => {
      const mb = (v.size/1024/1024).toFixed(0);
      const url = v.scope === 'shared' ? '/videos/shared/' + v.filename : '/videos/p/' + slug + '/' + v.filename;
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.7);';
      item.innerHTML = '&#127916; <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + v.original_name + '</span><span style="font-size:10px;color:rgba(255,255,255,0.3);">' + mb + 'MB</span>';
      item.addEventListener('mouseover', () => item.style.background = 'rgba(255,255,255,0.06)');
      item.addEventListener('mouseout', () => item.style.background = '');
      item.addEventListener('click', () => {
        const vid = document.getElementById('video-el');
        if (!vid) return;
        document.getElementById('drop-overlay').style.display = 'none';
        vid.src = url;
        setView(true);
      });
      clipDiv.appendChild(item);
    });
    ep.appendChild(clipDiv);
  } catch(e) { /* no clips, no problem */ }
}

loadFromServer();
resizeFrame();
